<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="toolbar no-print">
        <button onclick="addItem()" class="btn-add">+ Add Item</button>
        <button onclick="generatePDF()" class="btn-download">Download PDF</button>
    </div>

    <div id="invoice-container" class="invoice-box">
        <header>
            <div class="logo-section">
                <label for="logo-input" class="logo-uploader">
                    <img id="company-logo" src="https://via.placeholder.com/500x500?text=Click+to+Upload+Logo" alt="Logo">
                    <div class="upload-overlay"><span>Change Logo</span></div>
                </label>
                <input type="file" id="logo-input" accept="image/*" onchange="loadLogo(event)" style="display:none;">
            </div>
            <div class="invoice-meta">
                <h1>INVOICE</h1>
                <div class="meta-item">
                    <label>Date:</label>
                    <input type="date" id="invoice-date">
                </div>
                <div class="meta-item">
                    <label>Invoice #:</label>
                    <input type="text" placeholder="INV-001">
                </div>
            </div>
        </header>

        <div class="billing-grid">
            <div class="bill-box">
                <h3>Our Company</h3>
                <textarea placeholder="Your Company Name&#10;Address&#10;Phone & Email" rows="4"></textarea>
            </div>
            <div class="bill-box">
                <h3>Invoice To</h3>
                <textarea placeholder="Client Name&#10;Client Address&#10;Contact Info" rows="4"></textarea>
            </div>
        </div>

        <table id="items-table">
            <thead>
                <tr>
                    <th>SN</th>
                    <th>Description</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th class="no-print">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-label="SN">1</td>
                    <td data-label="Description"><input type="text" placeholder="Item/Service description"></td>
                    <td data-label="Qty"><input type="number" value="1" class="qty" oninput="calculate()"></td>
                    <td data-label="Price"><input type="number" value="0" class="price" oninput="calculate()"></td>
                    <td data-label="Total" class="row-total">0.00</td>
                    <td class="no-print"><button class="btn-del" onclick="removeItem(this)">×</button></td>
                </tr>
            </tbody>
        </table>

        <div class="invoice-footer">
            <div class="footer-left">
                <div class="input-group">
                    <label>Terms & Conditions</label>
                    <textarea placeholder="Payment due within 30 days..."></textarea>
                </div>
                <div class="input-group">
                    <label>Payment Method (e.g. Bkash/Bank)</label>
                    <textarea id="payment-input" placeholder="Enter payment details here..."></textarea>
                </div>
            </div>
            <div class="footer-right">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (%):</span>
                    <input type="number" id="tax-rate" value="0" oninput="calculate()">
                </div>
                <div class="summary-row grand-total">
                    <span>Grand Total:</span>
                    <span id="grand-total">0.00</span>
                </div>
                <div class="signature-section">
                    <div class="sig-line"></div>
                    <p>Authorized Signature</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
